# ==============================================================================
# pipelines/lz-vending.yml
# Azure Landing Zone Vending — Main Pipeline
#
# Stage model:
#   Stage 0a — Transform           Pure derivation. Produces lz-context.json artifact.
#   Stage 0b — Entra Groups        Creates Contributor + Reader security groups.
#   Stage 0c — Bicep Params        Generates .generated.bicepparam files.
#   Stage 1  — Validate            What-if against subscription deployment.
#   Stage 2  — Deploy Subscription Approval gate. Creates subscription via sub-vending.
#   Stage 3a — Approved Workload   Condition: workloadCategory == ApprovedWorkload
#   Stage 3b — BYO Networking      Condition: workloadCategory == BYO
#   Stage 4  — Connect vWAN        Condition: workloadType == Private
#
# Artifact flow:
#   lz-context          → published by 0a, consumed by 0b and 0c
#   generated-bicep-params → published by 0c, consumed by 1, 2, 3a, 3b
#   deployment-summary  → published by stage 4
#
# Trigger: Manual only (V1 ITSM approach).
# ==============================================================================

trigger: none

parameters:
  - name: requestFilePath
    displayName: 'Path to ITSM request JSON file (relative to repo root)'
    type: string
    default: 'requests/request.json'

  - name: serviceConnectionName
    displayName: 'Azure DevOps Service Connection (WIF)'
    type: string
    default: 'sc-lz-vending-wif'

variables:
  customerConfigPath: 'config/customer.config.json'

  # Declared at pipeline scope so stage condition expressions can reference them
  # safely even before Stage 0a runs. Populated by Stage 0a via isOutput=true.
  lzResourceBaseName:        ''
  lzSubscriptionAliasName:   ''
  lzManagementGroupId:       ''
  lzWorkloadCategory:        ''
  lzWorkloadType:            ''
  lzApprovedWorkloadPattern: ''
  lzLocation:                ''
  lzContributorGroupOid:     ''
  lzReaderGroupOid:          ''
  lzSpokeVNetResourceId:     ''

pool:
  vmImage: ubuntu-latest

stages:

# ==============================================================================
# Stage 0a — Transform
# Pure derivation. No Azure auth required. Produces the immutable lz-context.json.
# ==============================================================================

- stage: TransformData
  displayName: '0a — Transform Request'
  jobs:
  - job: TransformData
    displayName: 'Derive all computed values from request + config'
    steps:

    - checkout: self
      displayName: 'Checkout repository'

    - task: PowerShell@2
      displayName: 'Invoke-LZVending — Transform'
      name: LZTransform
      inputs:
        filePath: 'scripts/Invoke-LZVending.ps1'
        arguments: >
          -Stage              Transform
          -RequestFilePath    '${{ parameters.requestFilePath }}'
          -CustomerConfigPath '$(customerConfigPath)'
          -OutputDirectory    '$(Build.SourcesDirectory)'
          -SetADOVariables
        pwsh: true
        workingDirectory: '$(Build.SourcesDirectory)'

    - publish: '$(Build.SourcesDirectory)/artifacts/lz-context'
      artifact: lz-context
      displayName: 'Publish lz-context artifact (immutable)'

# ==============================================================================
# Stage 0b — Entra Groups
# Creates the Contributor and Reader security groups.
# Requires Azure CLI auth for az ad commands.
# ==============================================================================

- stage: ProvisionEntraGroups
  displayName: '0b — Provision Entra Groups'
  dependsOn: TransformData
  condition: succeeded('TransformData')
  variables:
    # Carry forward routing variables from Stage 0a
    lzResourceBaseName: $[ stageDependencies.TransformData.TransformData.outputs['LZTransform.lzResourceBaseName'] ]
    lzWorkloadCategory: $[ stageDependencies.TransformData.TransformData.outputs['LZTransform.lzWorkloadCategory'] ]
    lzWorkloadType:     $[ stageDependencies.TransformData.TransformData.outputs['LZTransform.lzWorkloadType'] ]
  jobs:
  - job: ProvisionEntraGroups
    displayName: 'Create Contributor + Reader groups and assign owner membership'
    steps:

    - checkout: self
      displayName: 'Checkout repository'

    - download: current
      artifact: lz-context
      displayName: 'Download lz-context artifact'

    - task: AzureCLI@2
      displayName: 'Invoke-LZVending — EntraGroups'
      name: LZEntraGroups
      inputs:
        azureSubscription: '${{ parameters.serviceConnectionName }}'
        scriptType:        bash
        scriptLocation:    inlineScript
        inlineScript: |
          pwsh scripts/Invoke-LZVending.ps1 \
            -Stage               EntraGroups \
            -ContextArtifactPath "$(Pipeline.Workspace)/lz-context/lz-context.json" \
            -SetADOVariables
        workingDirectory: '$(Build.SourcesDirectory)'

# ==============================================================================
# Stage 0c — Bicep Params
# Generates all .generated.bicepparam files in a single pass.
# Group OIDs from Stage 0b are merged into role assignments here so the
# what-if in Stage 1 is fully representative.
# ==============================================================================

- stage: GenerateBicepParams
  displayName: '0c — Generate Bicep Params'
  dependsOn:
    - TransformData
    - ProvisionEntraGroups
  condition: |
    and(
      succeeded('TransformData'),
      succeeded('ProvisionEntraGroups')
    )
  variables:
    # Routing variables from Stage 0a
    lzResourceBaseName:        $[ stageDependencies.TransformData.TransformData.outputs['LZTransform.lzResourceBaseName'] ]
    lzManagementGroupId:       $[ stageDependencies.TransformData.TransformData.outputs['LZTransform.lzManagementGroupId'] ]
    lzWorkloadCategory:        $[ stageDependencies.TransformData.TransformData.outputs['LZTransform.lzWorkloadCategory'] ]
    lzWorkloadType:            $[ stageDependencies.TransformData.TransformData.outputs['LZTransform.lzWorkloadType'] ]
    lzApprovedWorkloadPattern: $[ stageDependencies.TransformData.TransformData.outputs['LZTransform.lzApprovedWorkloadPattern'] ]
    lzLocation:                $[ stageDependencies.TransformData.TransformData.outputs['LZTransform.lzLocation'] ]
    # Group OIDs from Stage 0b
    lzContributorGroupOid:     $[ stageDependencies.ProvisionEntraGroups.ProvisionEntraGroups.outputs['LZEntraGroups.lzContributorGroupOid'] ]
    lzReaderGroupOid:          $[ stageDependencies.ProvisionEntraGroups.ProvisionEntraGroups.outputs['LZEntraGroups.lzReaderGroupOid'] ]
  jobs:
  - job: GenerateBicepParams
    displayName: 'Generate .generated.bicepparam files with merged role assignments'
    steps:

    - checkout: self
      displayName: 'Checkout repository'

    - download: current
      artifact: lz-context
      displayName: 'Download lz-context artifact'

    - task: PowerShell@2
      displayName: 'Invoke-LZVending — BicepParams'
      name: LZBicepParams
      inputs:
        filePath: 'scripts/Invoke-LZVending.ps1'
        arguments: >
          -Stage               BicepParams
          -ContextArtifactPath '$(Pipeline.Workspace)/lz-context/lz-context.json'
          -ContributorGroupOid '$(lzContributorGroupOid)'
          -ReaderGroupOid      '$(lzReaderGroupOid)'
          -OutputDirectory     '$(Build.SourcesDirectory)'
        pwsh: true
        workingDirectory: '$(Build.SourcesDirectory)'

    - publish: '$(Build.SourcesDirectory)/bicep'
      artifact: generated-bicep-params
      displayName: 'Publish generated-bicep-params artifact'

# ==============================================================================
# Stage 1 — Validate (What-If)
# Runs az deployment mg what-if so approvers see the full deployment preview
# including the platform-provisioned role assignments.
# ==============================================================================

- stage: Validate
  displayName: '1 — Validate (What-If)'
  dependsOn:
    - TransformData
    - GenerateBicepParams
  condition: |
    and(
      succeeded('TransformData'),
      succeeded('GenerateBicepParams')
    )
  variables:
    lzManagementGroupId: $[ stageDependencies.TransformData.TransformData.outputs['LZTransform.lzManagementGroupId'] ]
    lzLocation:          $[ stageDependencies.TransformData.TransformData.outputs['LZTransform.lzLocation'] ]
    lzResourceBaseName:  $[ stageDependencies.TransformData.TransformData.outputs['LZTransform.lzResourceBaseName'] ]
  jobs:
  - job: WhatIf
    displayName: 'Run what-if on subscription deployment'
    steps:

    - checkout: self

    - download: current
      artifact: generated-bicep-params
      displayName: 'Download generated-bicep-params artifact'

    - bash: |
        cp -r $(Pipeline.Workspace)/generated-bicep-params/. $(Build.SourcesDirectory)/bicep/
      displayName: 'Overlay generated param files onto bicep source directory'

    - task: AzureCLI@2
      displayName: 'Install Bicep CLI'
      inputs:
        azureSubscription: '${{ parameters.serviceConnectionName }}'
        scriptType:        bash
        scriptLocation:    inlineScript
        inlineScript: |
          az bicep install
          az bicep version

    - task: AzureCLI@2
      displayName: 'What-If — Subscription vending'
      inputs:
        azureSubscription: '${{ parameters.serviceConnectionName }}'
        scriptType:        bash
        scriptLocation:    inlineScript
        inlineScript: |
          STATUS=1
          for attempt in 1 2 3; do
            echo "What-if attempt $attempt of 3..."
            if az deployment mg what-if \
              --management-group-id '$(lzManagementGroupId)' \
              --location            '$(lzLocation)' \
              --name                'lz-whatif-$(lzResourceBaseName)-$(Build.BuildId)' \
              --template-file       'bicep/subscription/main.bicep' \
              --parameters          'bicep/subscription/main.generated.bicepparam' \
              --result-format       FullResourcePayloads; then
              STATUS=0
              break
            fi
            echo "Attempt $attempt failed."
            [ $attempt -lt 3 ] && echo "Waiting 30 seconds before retry..." && sleep 30
          done
          exit $STATUS
        workingDirectory: '$(Build.SourcesDirectory)'

# ==============================================================================
# Stage 2 — Deploy Subscription
# Approval gate before this stage.
# Configure in ADO: Pipelines → Environments → lz-vending-approval → Approvals.
# ==============================================================================

- stage: DeploySubscription
  displayName: '2 — Deploy Subscription'
  dependsOn:
    - TransformData
    - Validate
  condition: |
    and(
      succeeded('TransformData'),
      succeeded('Validate')
    )
  variables:
    lzManagementGroupId: $[ stageDependencies.TransformData.TransformData.outputs['LZTransform.lzManagementGroupId'] ]
    lzLocation:          $[ stageDependencies.TransformData.TransformData.outputs['LZTransform.lzLocation'] ]
    lzResourceBaseName:  $[ stageDependencies.TransformData.TransformData.outputs['LZTransform.lzResourceBaseName'] ]
    lzWorkloadCategory:  $[ stageDependencies.TransformData.TransformData.outputs['LZTransform.lzWorkloadCategory'] ]
    lzWorkloadType:      $[ stageDependencies.TransformData.TransformData.outputs['LZTransform.lzWorkloadType'] ]
  jobs:
  - deployment: DeploySubscription
    displayName: 'Create subscription via sub-vending AVM module'
    environment: lz-vending-approval   # ← approval gate
    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self

          - download: current
            artifact: generated-bicep-params
            displayName: 'Download generated-bicep-params artifact'

          - bash: |
              cp -r $(Pipeline.Workspace)/generated-bicep-params/. $(Build.SourcesDirectory)/bicep/
            displayName: 'Overlay generated param files onto bicep source directory'

          - task: AzureCLI@2
            displayName: 'Install Bicep CLI'
            inputs:
              azureSubscription: '${{ parameters.serviceConnectionName }}'
              scriptType:        bash
              scriptLocation:    inlineScript
              inlineScript: |
                az bicep install
                az bicep version

          - task: AzureCLI@2
            displayName: 'Deploy — Subscription vending'
            name: SubDeployOutput
            inputs:
              azureSubscription: '${{ parameters.serviceConnectionName }}'
              scriptType:        bash
              scriptLocation:    inlineScript
              inlineScript: |
                RESULT=$(az deployment mg create \
                  --management-group-id '$(lzManagementGroupId)' \
                  --location            '$(lzLocation)' \
                  --name                'lz-vending-$(lzResourceBaseName)-$(Build.BuildId)' \
                  --template-file       'bicep/subscription/main.bicep' \
                  --parameters          'bicep/subscription/main.generated.bicepparam' \
                  --output json)

                SUBSCRIPTION_ID=$(echo "$RESULT" | jq -r '.properties.outputs.subscriptionId.value')
                echo "New Subscription ID: $SUBSCRIPTION_ID"
                echo "##vso[task.setvariable variable=lzNewSubscriptionId;isOutput=true]$SUBSCRIPTION_ID"
              workingDirectory: '$(Build.SourcesDirectory)'

# ==============================================================================
# Stage 3a — Deploy Approved Workload
# Condition: workloadCategory == ApprovedWorkload
# ==============================================================================

- stage: DeployApprovedWorkload
  displayName: '3a — Deploy Approved Workload'
  dependsOn:
    - TransformData
    - DeploySubscription
  condition: |
    and(
      in(dependencies.DeploySubscription.result, 'Succeeded', 'Skipped'),
      eq(dependencies.TransformData.outputs['TransformData.LZTransform.lzWorkloadCategory'], 'ApprovedWorkload')
    )
  variables:
    lzApprovedWorkloadPattern: $[ stageDependencies.TransformData.TransformData.outputs['LZTransform.lzApprovedWorkloadPattern'] ]
    lzWorkloadType:            $[ stageDependencies.TransformData.TransformData.outputs['LZTransform.lzWorkloadType'] ]
    lzResourceBaseName:        $[ stageDependencies.TransformData.TransformData.outputs['LZTransform.lzResourceBaseName'] ]
    lzLocation:                $[ stageDependencies.TransformData.TransformData.outputs['LZTransform.lzLocation'] ]
    lzNewSubscriptionId:       $[ stageDependencies.DeploySubscription.DeploySubscription.outputs['SubDeployOutput.lzNewSubscriptionId'] ]
  jobs:
  - job: DeployApprovedWorkload
    displayName: 'Deploy approved workload pattern ($(lzApprovedWorkloadPattern))'
    steps:

    - checkout: self

    - download: current
      artifact: generated-bicep-params
      displayName: 'Download generated-bicep-params artifact'

    - bash: |
        cp -r $(Pipeline.Workspace)/generated-bicep-params/. $(Build.SourcesDirectory)/bicep/
      displayName: 'Overlay generated param files onto bicep source directory'

    - task: AzureCLI@2
      displayName: 'Install Bicep CLI'
      inputs:
        azureSubscription: '${{ parameters.serviceConnectionName }}'
        scriptType:        bash
        scriptLocation:    inlineScript
        inlineScript: |
          az bicep install
          az bicep version

    - task: AzureCLI@2
      displayName: 'Deploy — Approved Workload ($(lzApprovedWorkloadPattern))'
      name: ApprovedWorkloadOutput
      inputs:
        azureSubscription: '${{ parameters.serviceConnectionName }}'
        scriptType:        bash
        scriptLocation:    inlineScript
        inlineScript: |
          # Map pattern name to directory name
          case "$(lzApprovedWorkloadPattern)" in
            ContainerApps) PATTERN_DIR="aca-lza" ;;
            *)             echo "ERROR: Unknown pattern: $(lzApprovedWorkloadPattern)"; exit 1 ;;
          esac

          RESULT=$(az deployment sub create \
            --subscription '$(lzNewSubscriptionId)' \
            --location     '$(lzLocation)' \
            --name         'lz-vending-workload-$(lzResourceBaseName)-$(Build.BuildId)' \
            --template-file "bicep/approved-workloads/${PATTERN_DIR}/main.bicep" \
            --parameters    "bicep/approved-workloads/${PATTERN_DIR}/main.generated.bicepparam" \
            --output json)

          SPOKE_VNET_ID=$(echo "$RESULT" | jq -r '.properties.outputs.spokeVNetResourceId.value')
          echo "Spoke VNet Resource ID: $SPOKE_VNET_ID"
          echo "##vso[task.setvariable variable=lzSpokeVNetResourceId;isOutput=true]$SPOKE_VNET_ID"
        workingDirectory: '$(Build.SourcesDirectory)'
      env:
        LZ_VM_ADMIN_PASSWORD: $(lzVmAdminPassword)

# ==============================================================================
# Stage 3b — Deploy BYO Networking
# Condition: workloadCategory == BYO
# ==============================================================================

- stage: DeployBYONetworking
  displayName: '3b — Deploy BYO Networking'
  dependsOn:
    - TransformData
    - DeploySubscription
  condition: |
    and(
      in(dependencies.DeploySubscription.result, 'Succeeded', 'Skipped'),
      eq(dependencies.TransformData.outputs['TransformData.LZTransform.lzWorkloadCategory'], 'BYO')
    )
  variables:
    lzWorkloadType:      $[ stageDependencies.TransformData.TransformData.outputs['LZTransform.lzWorkloadType'] ]
    lzResourceBaseName:  $[ stageDependencies.TransformData.TransformData.outputs['LZTransform.lzResourceBaseName'] ]
    lzLocation:          $[ stageDependencies.TransformData.TransformData.outputs['LZTransform.lzLocation'] ]
    lzNewSubscriptionId: $[ stageDependencies.DeploySubscription.DeploySubscription.outputs['SubDeployOutput.lzNewSubscriptionId'] ]
  jobs:
  - job: DeployBYONetworking
    displayName: 'Deploy BYO VNet, NSG, and DNS zone links'
    steps:

    - checkout: self

    - download: current
      artifact: generated-bicep-params
      displayName: 'Download generated-bicep-params artifact'

    - bash: |
        cp -r $(Pipeline.Workspace)/generated-bicep-params/. $(Build.SourcesDirectory)/bicep/
      displayName: 'Overlay generated param files onto bicep source directory'

    - task: AzureCLI@2
      displayName: 'Install Bicep CLI'
      inputs:
        azureSubscription: '${{ parameters.serviceConnectionName }}'
        scriptType:        bash
        scriptLocation:    inlineScript
        inlineScript: |
          az bicep install
          az bicep version

    - task: AzureCLI@2
      displayName: 'Deploy — BYO Networking'
      name: BYONetworkingOutput
      inputs:
        azureSubscription: '${{ parameters.serviceConnectionName }}'
        scriptType:        bash
        scriptLocation:    inlineScript
        inlineScript: |
          RESULT=$(az deployment sub create \
            --subscription '$(lzNewSubscriptionId)' \
            --location     '$(lzLocation)' \
            --name         'lz-vending-networking-$(lzResourceBaseName)-$(Build.BuildId)' \
            --template-file 'bicep/networking/main.bicep' \
            --parameters    'bicep/networking/main.generated.bicepparam' \
            --output json)

          SPOKE_VNET_ID=$(echo "$RESULT" | jq -r '.properties.outputs.virtualNetworkResourceId.value')
          echo "Spoke VNet Resource ID: $SPOKE_VNET_ID"
          echo "##vso[task.setvariable variable=lzSpokeVNetResourceId;isOutput=true]$SPOKE_VNET_ID"
        workingDirectory: '$(Build.SourcesDirectory)'

# ==============================================================================
# Stage 4 — Connect vWAN
# Condition: workloadType == Private
# Reads spokeVNetResourceId from whichever of 3a or 3b ran.
# ==============================================================================

- stage: ConnectVWAN
  displayName: '4 — Connect vWAN Hub'
  dependsOn:
    - TransformData
    - DeployApprovedWorkload
    - DeployBYONetworking
  condition: |
    and(
      in(dependencies.DeployApprovedWorkload.result, 'Succeeded', 'Skipped'),
      in(dependencies.DeployBYONetworking.result,    'Succeeded', 'Skipped'),
      not(failed()),
      eq(dependencies.TransformData.outputs['TransformData.LZTransform.lzWorkloadType'], 'Private')
    )
  variables:
    lzResourceBaseName:  $[ stageDependencies.TransformData.TransformData.outputs['LZTransform.lzResourceBaseName'] ]
    lzWorkloadCategory:  $[ stageDependencies.TransformData.TransformData.outputs['LZTransform.lzWorkloadCategory'] ]
    lzWorkloadType:      $[ stageDependencies.TransformData.TransformData.outputs['LZTransform.lzWorkloadType'] ]
    lzApprovedWorkloadPattern: $[ stageDependencies.TransformData.TransformData.outputs['LZTransform.lzApprovedWorkloadPattern'] ]
    # Consume spokeVNetResourceId from whichever stage ran — one will be empty
    lzSpokeVNetFromApproved: $[ stageDependencies.DeployApprovedWorkload.DeployApprovedWorkload.outputs['ApprovedWorkloadOutput.lzSpokeVNetResourceId'] ]
    lzSpokeVNetFromBYO:      $[ stageDependencies.DeployBYONetworking.DeployBYONetworking.outputs['BYONetworkingOutput.lzSpokeVNetResourceId'] ]
  jobs:
  - job: ConnectVWAN
    displayName: 'Create vWAN hub connection'
    steps:

    - checkout: self

    - task: AzureCLI@2
      displayName: 'Parse vWAN config from customer.config.json'
      name: VWANConfig
      inputs:
        azureSubscription: '${{ parameters.serviceConnectionName }}'
        scriptType:        bash
        scriptLocation:    inlineScript
        inlineScript: |
          VWAN_HUB_RESOURCE_ID=$(jq -r '.vwanHubResourceId'          config/customer.config.json)
          VWAN_HUB_RG=$(jq -r          '.vwanHubResourceGroupName'   config/customer.config.json)
          VWAN_HUB_NAME=$(echo "$VWAN_HUB_RESOURCE_ID" | awk -F'/' '{print $NF}')
          VWAN_HUB_SUB=$(echo  "$VWAN_HUB_RESOURCE_ID" | awk -F'/' '{print $3}')

          echo "vWAN Hub:  $VWAN_HUB_NAME"
          echo "vWAN RG:   $VWAN_HUB_RG"
          echo "vWAN Sub:  $VWAN_HUB_SUB"

          echo "##vso[task.setvariable variable=vwanHubName;isOutput=true]$VWAN_HUB_NAME"
          echo "##vso[task.setvariable variable=vwanHubRg;isOutput=true]$VWAN_HUB_RG"
          echo "##vso[task.setvariable variable=vwanHubSub;isOutput=true]$VWAN_HUB_SUB"
        workingDirectory: '$(Build.SourcesDirectory)'

    - task: AzureCLI@2
      displayName: 'Resolve spoke VNet resource ID'
      name: ResolveVNet
      inputs:
        azureSubscription: '${{ parameters.serviceConnectionName }}'
        scriptType:        bash
        scriptLocation:    inlineScript
        inlineScript: |
          APPROVED_ID='$(lzSpokeVNetFromApproved)'
          BYO_ID='$(lzSpokeVNetFromBYO)'

          if [ -n "$APPROVED_ID" ] && [ "$APPROVED_ID" != " " ]; then
            SPOKE_VNET_ID="$APPROVED_ID"
            echo "Resolved from Stage 3a (ApprovedWorkload)"
          elif [ -n "$BYO_ID" ] && [ "$BYO_ID" != " " ]; then
            SPOKE_VNET_ID="$BYO_ID"
            echo "Resolved from Stage 3b (BYO)"
          else
            echo "ERROR: Could not resolve spoke VNet resource ID from Stage 3a or 3b."
            exit 1
          fi

          echo "Spoke VNet Resource ID: $SPOKE_VNET_ID"
          echo "##vso[task.setvariable variable=resolvedSpokeVNetId;isOutput=true]$SPOKE_VNET_ID"

    - task: AzureCLI@2
      displayName: 'Create vWAN hub connection'
      inputs:
        azureSubscription: '${{ parameters.serviceConnectionName }}'
        scriptType:        bash
        scriptLocation:    inlineScript
        inlineScript: |
          CONNECTION_NAME="$(lzResourceBaseName)-vhub-conn"
          SPOKE_VNET_ID='$(ResolveVNet.resolvedSpokeVNetId)'
          VWAN_HUB_NAME='$(VWANConfig.vwanHubName)'
          VWAN_HUB_RG='$(VWANConfig.vwanHubRg)'
          VWAN_HUB_SUB='$(VWANConfig.vwanHubSub)'

          echo "Creating vWAN connection: $CONNECTION_NAME"
          echo "  Hub:        $VWAN_HUB_NAME"
          echo "  RG:         $VWAN_HUB_RG"
          echo "  Sub:        $VWAN_HUB_SUB"
          echo "  Spoke VNet: $SPOKE_VNET_ID"

          az account set --subscription "$VWAN_HUB_SUB"

          az network vhub connection create \
            --name         "$CONNECTION_NAME" \
            --vhub-name    "$VWAN_HUB_NAME" \
            --resource-group "$VWAN_HUB_RG" \
            --remote-vnet  "$SPOKE_VNET_ID" \
            --output table

          echo "vWAN connection created successfully."

    - task: AzureCLI@2
      displayName: 'Publish deployment summary'
      inputs:
        azureSubscription: '${{ parameters.serviceConnectionName }}'
        scriptType:        bash
        scriptLocation:    inlineScript
        inlineScript: |
          cat > $(Build.ArtifactStagingDirectory)/lz-vending-summary.md << EOF
          # Landing Zone Vending — Deployment Summary

          | Field | Value |
          |---|---|
          | Build | $(Build.BuildId) |
          | Request | ${{ parameters.requestFilePath }} |
          | Resource Base Name | $(lzResourceBaseName) |
          | Workload Category | $(lzWorkloadCategory) |
          | Workload Type | $(lzWorkloadType) |
          | Approved Workload Pattern | $(lzApprovedWorkloadPattern) |
          | Spoke VNet | $(ResolveVNet.resolvedSpokeVNetId) |
          | Contributor Group | $(lzContributorGroupOid) |
          | Reader Group | $(lzReaderGroupOid) |
          | Deployed At | $(date -u +"%Y-%m-%dT%H:%M:%SZ") |
          EOF

    - publish: $(Build.ArtifactStagingDirectory)/lz-vending-summary.md
      artifact: deployment-summary
      displayName: 'Publish deployment summary artifact'
